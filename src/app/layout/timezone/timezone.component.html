<div class="d-flex">
  <div class="mobile-462-size">Timezone:</div>
  <select
    *ngIf="adminService.editable$ | async; else textRef"
    [(ngModel)]="timezone"
    (change)="changeTimezone()">
    <option *ngFor="let value of timezones"
            [value]="value">
      {{ value }}
    </option>
  </select>
  <ng-template #textRef>
    {{ timezone }}
  </ng-template>
</div>
