<div class="d-flex flex-column gap-2">

  <div class="yt-iframe d-flex align-items-center justify-content-center position-relative"
       [style.min-height]="'300px'">
    <ng-container *ngIf="ytIframeSource; else emptySourceTemplate">
      <iframe id="ytplayer" type="text/html"
              class="position-absolute"
              [src]="ytIframeSource"
              frameborder="0" allow="autoplay"
              [style.height]="'100%'"
              [style.width]="'100%'"></iframe>
    </ng-container>
    <ng-template #emptySourceTemplate>
      <div class="d-flex align-items-center justify-content-center h-100 w-100">
        Enter a valid Start, End and Video Id.
      </div>
    </ng-template>
  </div>

  <div class="d-flex align-items-center justify-content-center">
    <button type="button" class="btn btn-link btn-sm btn-rounded"
            [disabled]="!isVideoValid"
            (click)="changeYtInfo(true)">
          preview
    </button>
  </div>

  <mdb-form-control>
    <input mdbInput type="number" id="formControlTitle" class="form-control" [(ngModel)]="item.start"/>
    <label mdbLabel class="form-label" for="formControlTitle">Start</label>
  </mdb-form-control>
  <mdb-form-control>
    <input mdbInput type="number" id="formControlChannelId" class="form-control" [(ngModel)]="item.end"/>
    <label mdbLabel class="form-label" for="formControlChannelId">End</label>
  </mdb-form-control>
  <mdb-form-control>
    <input mdbInput type="text" id="formControlYoutubeLink" class="form-control" [(ngModel)]="item.videoId"/>
    <label mdbLabel class="form-label" for="formControlYoutubeLink">Video Id</label>
  </mdb-form-control>
  <mdb-form-control>
    <input mdbInput type="text" id="formControlTwitterLink" class="form-control" [(ngModel)]="item.text"/>
    <label mdbLabel class="form-label" for="formControlTwitterLink">Text</label>
  </mdb-form-control>
  <mdb-form-control>
    <input mdbInput type="text" id="formControlTwitchLink" class="form-control" [(ngModel)]="item.streamer"/>
    <label mdbLabel class="form-label" for="formControlTwitchLink">Streamer</label>
  </mdb-form-control>

</div>
