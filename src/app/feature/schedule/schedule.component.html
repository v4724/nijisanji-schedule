
<div class="container h-100 d-flex flex-column">
  <div class="d-flex flex-wrap justify-content-center align-items-center m-2 position-relative" >
    <div class="schedule-lick py-1 px-2" [routerLink]="Schedule.Date"
         [class.cursor-pointer]="current !== Schedule.Date"
         (click)="current = Schedule.Date">Date</div>
    <div class="mx-1">|</div>
    <div class="schedule-lick py-1 px-2" [routerLink]="Schedule.Week"
         [class.cursor-pointer]="current !== Schedule.Week"
         (click)="current = Schedule.Week">Week</div>
    <div class="mx-1">|</div>
    <div class="schedule-lick py-1 px-2" [routerLink]="Schedule.Month"
         [class.cursor-pointer]="current !== Schedule.Month"
         (click)="current = Schedule.Month">Month</div>

    <app-login class="mx-3"></app-login>
    <ng-container *ngIf="adminService.isLogin$ | async">
      <div class="schedule-lick py-1 px-2 me-3" [routerLink]="Schedule.New"
           [class.cursor-pointer]="current !== Schedule.New"
           (click)="current = Schedule.New">New Schedule</div>

      <a class="me-3"
         role="button"
         (click)="adminService.editToggle()">
        <i class="fas fa-pen-nib"
           [class]="{ 'editable': adminService.editable$ | async }"
        ></i>
      </a>
    </ng-container>

    <app-schedule-checked-list></app-schedule-checked-list>
  </div>

  <app-toolbar></app-toolbar>

  <div class="h-100 flex-grow-1 mb-3">
    <router-outlet></router-outlet>
  </div>
</div>

<app-rainbow-loader>
</app-rainbow-loader>
